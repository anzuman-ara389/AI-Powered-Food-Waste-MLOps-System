version: "3.9"

services:

  fastapi:
    build: .
    container_name: food_waste_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  streamlit:
    build: .
    container_name: food_waste_dashboard
    command: streamlit run src/frontend.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - fastapi